name: Build macOS App

on:
  # 测试流程：每次 push 到 main 分支时触发（只打包，不发布）
  push:
    branches: [main]
  # 手动触发（方便测试）
  workflow_dispatch:

jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # 缓存 Electron 二进制文件，加速后续构建
      - name: Cache Electron
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: mac-electron-${{ hashFiles('**/package-lock.json') }}

      - name: Cache Electron Builder
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron-builder
          key: mac-electron-builder-${{ hashFiles('**/package-lock.json') }}

      # ========== 测试流程：普通 push 只打包，不上传 Release ==========
      - name: Build macOS (Test)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run build:mac

      # ========== 正式流程：打 tag 时打包 + 发布到 GitHub Releases ==========
      - name: Build & Release macOS
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: npm run build:mac -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # macOS 代码签名（必须配置 Secrets）
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # macOS 公证（Notarization）配置
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        if: ${{ success() }}
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-${{ github.ref_name }}
          path: |
            main-client/dist/*.dmg
            main-client/dist/*.zip
            main-client/dist/*.blockmap
            main-client/dist/latest*.yml
